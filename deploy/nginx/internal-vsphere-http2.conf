# KoWoBau-Planner internal vSphere reverse proxy.
#
# Install on the VM as, for example:
#   /etc/nginx/sites-available/kowobau.conf
#   ln -s /etc/nginx/sites-available/kowobau.conf /etc/nginx/sites-enabled/
#
# Intended setup:
#   - Only reachable from the internal 192.168.1.0/24 LAN.
#   - Host Nginx terminates TLS with an internal/self-managed certificate.
#   - Docker Compose publishes the app's internal Nginx on 127.0.0.1:8080.
#   - Start Compose with: KOWOBAU_HTTP_PORT=8080 docker compose up -d --build
#
# Replace:
#   - 192.168.1.50 with the VM's static LAN IP.
#   - kowobau.lan with your internal DNS name, or remove it if you only use IP.
#   - certificate paths with your real certificate files.
#
# For NGINX older than 1.25.1, replace "http2 on;" with:
#   listen 192.168.1.50:443 ssl http2;

limit_req_zone $binary_remote_addr zone=kowobau_auth_edge:10m rate=10r/m;

upstream kowobau_docker_nginx {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 192.168.1.50:80;
    server_name kowobau.lan 192.168.1.50;

    allow 192.168.1.0/24;
    deny all;

    return 301 https://$host$request_uri;
}

server {
    listen 192.168.1.50:443 ssl;
    http2 on;

    server_name kowobau.lan 192.168.1.50;

    allow 192.168.1.0/24;
    deny all;

    ssl_certificate /etc/nginx/certs/kowobau/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/kowobau/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 50m;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/auth/ {
        limit_req zone=kowobau_auth_edge burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://kowobau_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    location / {
        proxy_pass http://kowobau_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }
}
